apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  labels:
    app.kubernetes.io/name: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector:0.143.0
        args:
        - --config=/etc/otelcol/config.yaml
        ports:
        - name: otlp-http
          containerPort: 4318
        resources:
          requests:
            cpu: 25m
            memory: 96Mi
          limits:
            cpu: 250m
            memory: 192Mi
        volumeMounts:
        - name: config
          mountPath: /etc/otelcol
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: otel-collector-config
