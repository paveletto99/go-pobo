apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-service
  labels:
    app.kubernetes.io/name: sample-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-service
    spec:
      containers:
      - name: sample-service
        image: sample-service
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
        envFrom:
        - configMapRef:
            name: sample-service-config
        - secretRef:
            name: sample-service-secret
        readinessProbe:
          httpGet:
            path: /health
            port: http
          periodSeconds: 10
          timeoutSeconds: 2
        livenessProbe:
          httpGet:
            path: /health
            port: http
          periodSeconds: 20
          timeoutSeconds: 2
        startupProbe:
          httpGet:
            path: /health
            port: http
          failureThreshold: 30
          periodSeconds: 2
